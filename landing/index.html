<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LESTBET 369 — Login</title>
  <meta name="description" content="Entre na plataforma LESTBET 369 com o WhatsApp da lista VIP." />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
    }
    .login-card {
      width: min(100%, 420px);
      padding: 1.75rem 1.4rem;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
    }
    .login-card img {
      width: 88px;
      height: auto;
      border-radius: 18px;
      display: block;
      margin: 0 auto 1rem;
    }
    .login-card h1 {
      margin: 0 0 0.35rem;
      text-align: center;
      font-family: var(--display);
      font-size: 1.7rem;
    }
    .login-card .sub {
      text-align: center;
      color: var(--muted);
      margin: 0 0 1.25rem;
    }
    .login-card form {
      display: grid;
      gap: 0.85rem;
    }
    .login-status {
      min-height: 1.2em;
      margin: 0;
      font-weight: 700;
      color: var(--gold-2);
      text-align: center;
    }
    .login-links {
      margin-top: 1rem;
      text-align: center;
    }
    .login-links a {
      color: var(--gold-2);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="glow glow-a" aria-hidden="true"></div>
  <div class="glow glow-b" aria-hidden="true"></div>
  <main class="login-wrap">
    <div class="login-card">
      <img src="/assets/logo.png" alt="LESTBET 369" width="88" height="88" />
      <h1>Entrar na LESTBET 369</h1>
      <p class="sub">Use o WhatsApp cadastrado na lista VIP.</p>
      <form id="login-form" novalidate>
        <label>
          WhatsApp
          <input id="login-whatsapp" name="whatsapp" type="tel" autocomplete="tel" required placeholder="DDD + número" />
        </label>
        <button class="btn btn-primary btn-block" type="submit">Entrar</button>
        <p class="login-status" id="login-status" role="status" aria-live="polite"></p>
      </form>
      <p class="login-links">
        Ainda não tem cadastro? <a href="/acessovip">Quero minha vaga VIP</a>
      </p>
    </div>
  </main>
  <script src="/config.js"></script>
  <script>
    (() => {
      const cfg = window.LESTBET_CONFIG || {};
      const form = document.getElementById("login-form");
      const status = document.getElementById("login-status");
      const input = document.getElementById("login-whatsapp");
      const digitsOnly = (v) => String(v || "").replace(/\D/g, "");

      const params = new URLSearchParams(window.location.search);
      const prefill = digitsOnly(params.get("whatsapp") || "");
      if (prefill && input) input.value = prefill;

      const apiBase = (() => {
        const host = window.location.hostname;
        const isLocal = host === "127.0.0.1" || host === "localhost";
        return isLocal ? "http://127.0.0.1:8089" : "";
      })();

      form?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const whatsapp = digitsOnly(input?.value);
        if (whatsapp.length < 10) {
          status.textContent = "Informe um WhatsApp válido.";
          return;
        }
        status.textContent = "Verificando...";
        try {
          const res = await fetch(apiBase + "/api/leads/check?whatsapp=" + encodeURIComponent(whatsapp));
          const data = await res.json();
          if (!res.ok || !data.ok) throw new Error(data.error || "Falha na verificação");
          if (!data.exists) {
            status.textContent = "Telefone não encontrado. Faça seu cadastro VIP.";
            return;
          }
          status.textContent = "Login ok! Abrindo plataforma...";
          window.setTimeout(() => {
            const platform = (cfg.platformUrl || "/plataforma.html").trim();
            window.location.assign(platform + (platform.includes("?") ? "&" : "?") + "whatsapp=" + encodeURIComponent(whatsapp));
          }, 500);
        } catch (err) {
          status.textContent = err.message || "Erro ao entrar.";
        }
      });
    })();
  </script>
</body>
</html>
