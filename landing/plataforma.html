<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LESTBET 369 — Plataforma</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }
    .gate-card {
      width: min(100%, 480px);
      padding: 2rem 1.5rem;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
      box-shadow: var(--shadow);
    }
    .gate img {
      width: 140px;
      height: auto;
      border-radius: 24px;
      margin-bottom: 1rem;
      animation: floaty 4.5s ease-in-out infinite;
    }
    .gate h1 {
      margin: 0 0 0.6rem;
      font-family: var(--display);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
    }
    .gate p {
      margin: 0 0 1.4rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .gate .cta-row {
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="glow glow-a" aria-hidden="true"></div>
  <div class="glow glow-b" aria-hidden="true"></div>
  <main class="gate">
    <div class="gate-card">
      <img src="/assets/logo.png" alt="LESTBET 369" width="140" height="140" />
      <h1>Bem-vindo à LESTBET 369</h1>
      <p>Seu cadastro VIP foi recebido. Em breve liberamos o acesso completo aos jogos. Enquanto isso, acompanhe os canais oficiais.</p>
      <div class="cta-row">
        <a class="btn btn-primary" href="https://www.instagram.com/lestbet369/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a class="btn btn-secondary" href="https://www.tiktok.com/@lestbet_" target="_blank" rel="noopener noreferrer">TikTok</a>
      </div>
    </div>
  </main>
</body>
</html>
